<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decentralized Crypto Wallet</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Ethers.js CDN (UMD build for browser environment) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" defer></script>
    
    <!-- Project Scripts -->
    <script src="ethers.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header>
            <h1>Crypto Wallet</h1>
            <p>Sepolia Testnet Web3 Interface</p>
        </header>

        <main>
            <!-- Wallet Section -->
            <section class="card wallet-section">
                <h2>My Wallet</h2>
                <div class="wallet-info">
                    <!-- Connect Wallet Button -->
                    <button id="connect-btn" class="primary-btn">Connect MetaMask</button>
                    
                    <!-- Details (Hidden until connected) -->
                    <div id="wallet-details" class="hidden">
                        <div class="info-row">
                            <span class="label">Address:</span>
                            <span id="wallet-address" class="value">Not connected</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Network:</span>
                            <span id="network-name" class="value">Unknown</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Balance:</span>
                            <span class="value"><span id="wallet-balance">0.00</span> ETH</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Transaction Section (Hidden until connected) -->
            <section class="card transaction-section hidden" id="transaction-section">
                <h2>Send ETH</h2>
                <form id="send-form">
                    <div class="input-group">
                        <label for="receiver">Receiver Address</label>
                        <input type="text" id="receiver" placeholder="0x..." required>
                    </div>
                    <div class="input-group">
                        <label for="amount">Amount (ETH)</label>
                        <input type="number" id="amount" step="0.000000000000000001" min="0" placeholder="0.01" required>
                    </div>
                    <!-- Send ETH Button -->
                    <button type="submit" id="send-btn" class="primary-btn submit-btn">Send Transaction</button>
                </form>

                <!-- Transaction Output Status -->
                <div id="status-container" class="status-container hidden">
                    <h3>Transaction Status</h3>
                    <div id="status-message" class="status pending">Transaction Pending...</div>
                    <div class="tx-hash-container">
                        <span class="label">Tx Hash:</span>
                        <a id="tx-hash-link" href="#" target="_blank" class="value hash-link">Awaiting confirmation...</a>
                    </div>
                </div>
            </section>

            <!-- Transaction History Section (Hidden until connected) -->
            <section class="card history-section hidden" id="history-section">
                <h2>Transaction History</h2>
                <div class="table-responsive">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Sender</th>
                                <th>Receiver</th>
                                <th>Amount (ETH)</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Transactions will be populated here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
