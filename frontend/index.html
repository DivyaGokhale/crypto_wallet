<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decentralized Crypto Wallet</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">

        <header>
            <h1>Crypto Wallet</h1>
            <p>Sepolia Testnet Web3 Interface</p>
        </header>

        <main>

            <!-- TOP SECTION -->
            <div class="top-section">

                <!-- WALLET -->
                <section class="card wallet-section">
                    <h2>My Wallet</h2>

                    <div class="wallet-info">

                        <!-- CONNECT / CONNECTED UI -->
                        <div class="wallet-actions">
                            <button id="connect-btn" class="primary-btn">Connect Wallet</button>

                            <div id="connected-ui" class="hidden connected-ui">
                                <span id="short-address" class="address-badge">0x000...0000</span>
                                <button id="disconnect-btn" class="secondary-btn">Disconnect</button>
                            </div>
                        </div>

                        <!-- DETAILS -->
                        <div id="wallet-details" class="hidden">
                            <div class="info-row">
                                <span class="label">Address:</span>
                                <span id="wallet-address" class="value">Not connected</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Network:</span>
                                <span id="network-name" class="value">Unknown</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Balance:</span>
                                <span class="value"><span id="wallet-balance">0.00</span> ETH</span>
                            </div>
                        </div>

                    </div>
                </section>

                <!-- SEND ETH -->
                <section class="card transaction-section hidden" id="transaction-section">
                    <h2>Send ETH</h2>

                    <form id="send-form">
                        <div class="input-group">
                            <label>Receiver Address</label>
                            <input type="text" id="receiver" placeholder="0x..." required>
                        </div>

                        <div class="input-group">
                            <label>Amount (ETH)</label>
                            <input type="number" id="amount" step="0.000000000000000001" required>
                        </div>

                        <button type="submit" id="send-btn" class="primary-btn">
                            Send Transaction
                        </button>
                    </form>

                    <div id="status-container" class="status-container hidden">
                        <h3>Transaction Status</h3>
                        <div id="status-message" class="status pending">Pending...</div>
                        <div class="tx-hash-container">
                            <span>Tx Hash:</span>
                            <a id="tx-hash-link" target="_blank">...</a>
                        </div>
                    </div>
                </section>

            </div>

            <!-- HISTORY -->
            <section class="card history-section hidden full-width" id="history-section">
                <h2>Transaction History</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Sender</th>
                            <th>Receiver</th>
                            <th>Amount</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </section>

        </main>

    </div>
</body>
</html>
